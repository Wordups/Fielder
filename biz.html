<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Your Fielder business page</title>
<meta name="robots" content="noindex" />
<style>
  :root{
    --ink:#10251f; --paper:#f4f1e8; --paper-2:#eae6d9; --white:#fffdf7;
    --muted:#66756f; --line:rgba(16,37,31,.14); --brand:#3da35d;
    --display:"DM Serif Display",Georgia,serif; --sans:"Manrope",system-ui,-apple-system,"Segoe UI",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:var(--paper);color:var(--ink);line-height:1.55}
  a{color:inherit}
  .wrap{width:min(960px,calc(100% - 40px));margin-inline:auto}
  .hero{padding:84px 0 56px;background:var(--ink);color:var(--white);position:relative;overflow:hidden}
  .hero::after{content:"";position:absolute;right:-120px;top:-160px;width:480px;height:480px;border-radius:50%;border:1px solid color-mix(in srgb,var(--brand) 45%,transparent)}
  .eyebrow{display:inline-block;color:var(--brand);font-size:.7rem;font-weight:800;letter-spacing:.16em;text-transform:uppercase;margin-bottom:14px}
  .hero h1{font-family:var(--display);font-weight:400;font-size:clamp(2.6rem,7vw,4.6rem);line-height:1;letter-spacing:-.02em}
  .hero p.tag{margin-top:18px;max-width:560px;color:rgba(255,255,255,.72);font-size:1.1rem}
  .hero .meta{margin-top:22px;display:flex;flex-wrap:wrap;gap:8px}
  .chip{border:1px solid rgba(255,255,255,.22);border-radius:99px;padding:6px 13px;font-size:.78rem;color:rgba(255,255,255,.85)}
  .btn{display:inline-flex;align-items:center;gap:8px;border-radius:999px;padding:13px 22px;font-weight:800;font-size:.9rem;text-decoration:none;border:1px solid var(--brand);background:var(--brand);color:#fff;cursor:pointer}
  .btn--ghost{background:transparent;border-color:var(--line);color:var(--ink)}
  section.block{padding:56px 0}
  h2{font-family:var(--display);font-weight:400;font-size:clamp(1.8rem,4vw,2.6rem);margin-bottom:8px}
  .sub{color:var(--muted);margin-bottom:26px}
  .services{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
  .svc{border:1px solid var(--line);border-radius:14px;padding:20px;background:var(--white)}
  .svc h3{font-size:1.1rem;display:flex;justify-content:space-between;gap:10px;align-items:baseline}
  .svc .price{color:var(--brand);font-weight:800;white-space:nowrap}
  .svc p{color:var(--muted);font-size:.86rem;margin-top:6px}
  .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
  .gallery img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:12px;border:1px solid var(--line)}
  .contact{background:var(--paper-2)}
  form{display:grid;gap:12px;max-width:520px}
  label{font-size:.66rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
  input,select,textarea{width:100%;border:1px solid var(--line);border-radius:11px;padding:13px 14px;background:var(--white);font:inherit;font-size:.92rem}
  textarea{min-height:96px;resize:vertical}
  .field{display:grid;gap:6px}
  footer{padding:34px 0;border-top:1px solid var(--line);color:var(--muted);font-size:.82rem}
  .note{font-size:.74rem;color:var(--muted)}
  .powered{display:inline-flex;align-items:center;gap:7px;font-weight:800;color:var(--ink)}
  .powered .dot{width:9px;height:9px;border-radius:50%;background:var(--brand)}
  .empty{padding:60px 0;text-align:center;color:var(--muted)}
  @media (max-width:480px){
    .wrap{width:calc(100% - 24px)}
    .hero{padding:48px 0 32px}
    .hero h1{font-size:clamp(2.3rem,9vw,3.2rem)}
    section.block{padding:40px 0}
    .services{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
    .gallery{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}
    input,select{min-height:44px}
    .btn{min-height:44px;width:100%;justify-content:center}
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="fielder-config.js"></script>
</head>
<body>
<div id="app"><div class="empty wrap">Loading business…</div></div>

<script>
const FLOW = {
  appointment: { cta: "Book appointment", verb: "book" },
  quote:       { cta: "Request a quote",  verb: "quote" },
  capacity:    { cta: "Reserve your spot",verb: "reserve" },
  membership:  { cta: "Join / Subscribe", verb: "subscribe" },
};
const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

// Lead intake: AI triage (backend) + persist to the owner's dashboard (Supabase).
const FCFG = window.FIELDER || {};
const BACKEND = (FCFG.BACKEND_URL || "").replace(/\/+$/, "");
const SB = (FCFG.SUPABASE_URL && FCFG.SUPABASE_ANON_KEY && window.supabase)
  ? window.supabase.createClient(FCFG.SUPABASE_URL, FCFG.SUPABASE_ANON_KEY) : null;
const INTAKE_ENABLED = !!(BACKEND && SB);

function setStatus(el, msg, isErr){ if(el){ el.textContent = msg; el.style.color = isErr ? "#aa4934" : "var(--brand)"; } }

// Flow-aware intake fields — each flow asks for what the triage agent needs,
// so it gets structured input instead of guessing from one free-text box.
function serviceOptions(cfg){
  const opts = (cfg.services||[]).map(s=>`<option>${esc(s.name)}</option>`).join("");
  return `<option value="">— choose —</option>${opts}<option>Something else</option>`;
}
function flowFields(cfg){
  const svc = `<div class="field"><label>Service</label><select name="service">${serviceOptions(cfg)}</select></div>`;
  switch (cfg.flow) {
    case "quote": return `
      <div class="field"><label>What do you need?</label><textarea name="message" placeholder="Describe the job — size, surfaces, anything helpful"></textarea></div>
      <div class="field"><label>Property / area (optional)</label><input name="area" placeholder="e.g. 2-car driveway + back patio"></div>`;
    case "capacity": return `${svc}
      <div class="field"><label>How much / how often</label><input name="quantity" placeholder="e.g. 10 meals per week"></div>
      <div class="field"><label>Start when</label><input name="start" placeholder="e.g. next Monday"></div>`;
    case "membership": return `${svc}
      <div class="field"><label>Start date</label><input name="start" placeholder="e.g. June 1"></div>
      <div class="field"><label>Anything else? (optional)</label><textarea name="message" placeholder="Questions or details"></textarea></div>`;
    default: return `${svc}
      <div class="field"><label>Preferred day / time</label><input name="preferred" placeholder="e.g. Saturday morning"></div>
      <div class="field"><label>Notes (optional)</label><textarea name="message" placeholder="Anything we should know"></textarea></div>`;
  }
}
function composeMessage(form, cfg){
  const fd = new FormData(form);
  const get = (k) => (fd.get(k) || "").trim();
  const parts = [];
  if (get("service") && get("service") !== "Something else") parts.push(`Service: ${get("service")}`);
  if (get("preferred")) parts.push(`Preferred time: ${get("preferred")}`);
  if (get("quantity"))  parts.push(`Quantity/frequency: ${get("quantity")}`);
  if (get("area"))      parts.push(`Property/area: ${get("area")}`);
  if (get("start"))     parts.push(`Start: ${get("start")}`);
  if (get("message"))   parts.push(get("message"));
  return parts.join(". ") || `${(cfg.services||[])[0]?.name || "service"} request`;
}

function wireIntake(cfg){
  const form = document.getElementById("intakeForm");
  if (!form || !INTAKE_ENABLED) return;  // not configured → native FormSubmit / preview handles it
  const status = document.getElementById("intakeStatus");
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const fd = new FormData(form);
    if ((fd.get("_honey") || "").trim()) return;  // bot trap
    const lead = {
      lead_name: (fd.get("name") || "").trim(),
      lead_contact: (fd.get("contact") || "").trim(),
      message: composeMessage(form, cfg),
      channel: "website",
    };
    setStatus(status, "Sending…");
    try {
      const r = await fetch(`${BACKEND}/api/intake`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ config: cfg, ...lead }),
      });
      if (!r.ok) throw new Error(await r.text());
      const triage = await r.json();
      const { error } = await SB.from("leads").insert({
        slug: cfg.slug,
        lead_name: lead.lead_name,
        lead_contact: lead.lead_contact,
        channel: lead.channel,
        message: lead.message,
        triage,
        status: "new",
      });
      if (error) throw error;
      form.reset();
      setStatus(status, `Thanks! ${cfg.businessName} got your request and will follow up.`);
    } catch (err) {
      console.error("[Fielder intake]", err);
      setStatus(status, "Couldn't send just now — please try again or reach out directly.", true);
    }
  });
}

function decodeConfig(c){
  try { return JSON.parse(decodeURIComponent(escape(atob(c.replace(/-/g,"+").replace(/_/g,"/"))))); }
  catch { return null; }
}

async function loadConfig(){
  const p = new URLSearchParams(location.search);
  if (p.get("c")) return decodeConfig(p.get("c"));
  if (p.get("slug")) {
    const slug = p.get("slug");
    // 1) bundled example config (clients/<slug>.json)
    try { const r = await fetch(`clients/${slug}.json`,{cache:"no-store"}); if (r.ok) return r.json(); } catch {}
    // 2) a page published to Supabase from onboarding (public read)
    if (SB) {
      try { const { data } = await SB.from("sites").select("config").eq("slug", slug).maybeSingle(); if (data && data.config) return data.config; } catch {}
    }
  }
  return null;
}

// Design themes: each "look" picks a font pairing + palette. Applied from cfg.theme.
const FONTS = {
  "serif-classic": { display: "'DM Serif Display', Georgia, serif", body: "'Manrope', system-ui, sans-serif", href: "https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Manrope:wght@400;600;700;800&display=swap" },
  "editorial":     { display: "'Playfair Display', Georgia, serif", body: "'Inter', system-ui, sans-serif", href: "https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;800&family=Inter:wght@400;500;600;700&display=swap" },
  "warm-modern":   { display: "'Fraunces', Georgia, serif", body: "'Work Sans', system-ui, sans-serif", href: "https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Work+Sans:wght@400;500;600;700&display=swap" },
  "bold-sans":     { display: "'Space Grotesk', system-ui, sans-serif", body: "'Inter', system-ui, sans-serif", href: "https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" },
  "clean-minimal": { display: "'Archivo', system-ui, sans-serif", body: "'Inter', system-ui, sans-serif", href: "https://fonts.googleapis.com/css2?family=Archivo:wght@600;800&family=Inter:wght@400;500;600;700&display=swap" },
};
function applyTheme(cfg){
  const root = document.documentElement.style;
  if (cfg.brandColor) root.setProperty("--brand", cfg.brandColor);
  const t = cfg.theme;
  if (!t) return;
  if (t.accent) root.setProperty("--brand", t.accent);
  if (t.bg) { root.setProperty("--paper", t.bg); root.setProperty("--paper-2", t.bg); }
  if (t.ink) root.setProperty("--ink", t.ink);
  const f = FONTS[t.font];
  if (f) {
    const link = document.createElement("link"); link.rel = "stylesheet"; link.href = f.href; document.head.appendChild(link);
    root.setProperty("--display", f.display); root.setProperty("--sans", f.body);
  }
}

function render(cfg){
  const app = document.getElementById("app");
  if (!cfg || !cfg.businessName){
    const hadSlug = new URLSearchParams(location.search).get("slug");
    app.innerHTML = hadSlug
      ? `<div class="empty wrap">
           <h2 style="font-family:var(--display);font-weight:400;font-size:2rem;margin-bottom:8px">Coming soon</h2>
           <p>This business is setting up on Fielder — check back shortly.</p>
           <p style="margin-top:16px"><span class="powered"><span class="dot"></span>Built on Fielder</span></p>
         </div>`
      : `<div class="empty wrap">No business config. Open this page from onboarding, or add <code>?slug=name</code>.</div>`;
    return;
  }
  applyTheme(cfg);
  document.title = cfg.businessName + " — Fielder";

  const flow = FLOW[cfg.flow] || FLOW.appointment;
  const c = cfg.contact || {};
  const meta = [c.location, c.instagram, c.phone].filter(Boolean)
    .map(x => `<span class="chip">${esc(x)}</span>`).join("");

  const services = (cfg.services||[]).length
    ? `<section class="block wrap"><h2>Services</h2><p class="sub">What ${esc(cfg.businessName)} offers.</p>
        <div class="services">${cfg.services.map(s=>`
          <div class="svc"><h3>${esc(s.name)}${s.price?`<span class="price">${esc(s.price)}</span>`:""}</h3>
          ${s.description?`<p>${esc(s.description)}</p>`:""}</div>`).join("")}</div></section>` : "";

  const gallery = (cfg.portfolio||[]).length
    ? `<section class="block wrap"><h2>Work</h2><div class="gallery">${cfg.portfolio.map(u=>`<img src="${esc(u)}" alt="" loading="lazy">`).join("")}</div></section>` : "";

  const about = cfg.about ? `<section class="block wrap"><h2>About</h2><p class="sub" style="max-width:640px">${esc(cfg.about)}</p></section>` : "";

  // When BACKEND_URL + Supabase are configured, the form is handled in JS
  // (AI triage + persist to the owner's dashboard). Otherwise it falls back to
  // an email-only FormSubmit POST, and if there's no owner email, to preview.
  const formAction = c.email ? `https://formsubmit.co/${esc(c.email)}` : "";
  const useFormSubmit = !INTAKE_ENABLED && !!formAction;
  const intake = `
    <section class="block contact"><div class="wrap">
      <h2>${flow.cta}</h2>
      <p class="sub">Send your details and ${esc(cfg.businessName)} will follow up.</p>
      <form id="intakeForm" ${useFormSubmit?`action="${formAction}" method="POST"`:""}>
        <input type="hidden" name="_subject" value="New ${esc(flow.verb)} request — ${esc(cfg.businessName)}">
        <input type="hidden" name="_captcha" value="false">
        <input type="text" name="_honey" tabindex="-1" autocomplete="off" style="position:absolute;left:-9999px" aria-hidden="true">
        <div class="field"><label>Your name</label><input name="name" required></div>
        <div class="field"><label>Email or phone</label><input name="contact" required></div>
        ${flowFields(cfg)}
        <button class="btn" type="submit">${flow.cta} →</button>
        <p class="note" id="intakeStatus" role="status" aria-live="polite">${(!INTAKE_ENABLED && !formAction)?"Owner email wasn't detected, so submissions are disabled in this preview.":""}</p>
      </form>
    </div></section>`;

  app.innerHTML = `
    <header class="hero"><div class="wrap">
      <span class="eyebrow">${esc((cfg.industry||"local service").replace(/_/g," "))}</span>
      <h1>${esc(cfg.businessName)}</h1>
      ${cfg.tagline?`<p class="tag">${esc(cfg.tagline)}</p>`:""}
      ${meta?`<div class="meta">${meta}</div>`:""}
      <div style="margin-top:26px"><a class="btn" href="#go">${flow.cta} →</a></div>
    </div></header>
    ${services}${gallery}${about}
    <a id="go"></a>${intake}
    <footer><div class="wrap"><span class="powered"><span class="dot"></span>Built on Fielder</span></div></footer>`;

  wireIntake(cfg);
}

loadConfig().then(render);
</script>
</body>
</html>
